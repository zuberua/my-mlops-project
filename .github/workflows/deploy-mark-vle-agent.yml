name: Deploy Mark Vle Agent to ECR

on:
  push:
    branches:
      - main
    paths:
      - 'mark-vle-strands-agent/**'
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: bedrock-agentcore-mcp_server
  IMAGE_TAG: latest

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    
    outputs:
      IMAGE_URI: ${{ steps.output.outputs.IMAGE_URI }}
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-MarkVleAgent
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build, tag, and push image to Amazon ECR
        working-directory: ./mark-vle-strands-agent
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building Docker image..."
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          echo "Pushing Docker image..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          echo "Image pushed successfully!"
          echo "Image URI: $ECR_REGISTRY/$ECR_REPOSITORY:latest"
      
      - name: Output image URI
        id: output
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "::notice title=Deployment Complete::Image URI: $ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:latest" >> $GITHUB_OUTPUT
  
  deploy-to-agentcore:
    name: Deploy to AgentCore
    needs: build-and-push
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read
    
    environment:
      name: agentcore-production
      url: https://console.aws.amazon.com/bedrock/home?region=${{ env.AWS_REGION }}#/agentcore
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-AgentCoreDeploy
      
      - name: Deploy to AgentCore Runtime
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.IMAGE_URI }}
          RUNTIME_ARN: arn:aws:bedrock-agentcore:us-east-1:138720056246:runtime/agent-675ATtDQE1
          AGENT_NAME: mark-vle-agent
        run: |
          echo "Deploying to AgentCore Runtime"
          echo "Runtime ARN: $RUNTIME_ARN"
          echo "Image URI: $IMAGE_URI"
          echo "Agent Name: $AGENT_NAME"
          
          # Check if agent exists in runtime
          AGENT_ARN=$(aws bedrock-agentcore list-agents \
            --runtime-arn $RUNTIME_ARN \
            --region $AWS_REGION \
            --query "agents[?name=='$AGENT_NAME'].arn" \
            --output text 2>/dev/null || echo "")
          
          if [ -z "$AGENT_ARN" ]; then
            echo "Agent not found. Creating new agent in AgentCore..."
            
            # Create agent in AgentCore runtime
            aws bedrock-agentcore create-agent \
              --runtime-arn $RUNTIME_ARN \
              --name $AGENT_NAME \
              --image-uri $IMAGE_URI \
              --execution-role-arn ${{ secrets.AGENTCORE_EXECUTION_ROLE_ARN }} \
              --region $AWS_REGION \
              --environment-variables AWS_REGION=us-west-2,S3_BUCKET_NAME=mark-vie-kb-138720056246,EMBEDDING_MODEL=amazon.titan-embed-text-v2:0
            
            echo "✓ Agent created in AgentCore"
          else
            echo "✓ Agent found: $AGENT_ARN"
            echo "Updating agent..."
            
            # Update agent in AgentCore runtime
            aws bedrock-agentcore update-agent \
              --agent-arn $AGENT_ARN \
              --image-uri $IMAGE_URI \
              --execution-role-arn ${{ secrets.AGENTCORE_EXECUTION_ROLE_ARN }} \
              --region $AWS_REGION \
              --environment-variables AWS_REGION=us-west-2,S3_BUCKET_NAME=mark-vie-kb-138720056246,EMBEDDING_MODEL=amazon.titan-embed-text-v2:0
            
            echo "✓ Agent updated in AgentCore"
          fi
          
          echo "AGENT_ARN=$AGENT_ARN" >> $GITHUB_OUTPUT
      
      - name: Deployment Summary
        run: |
          echo "## 🚀 AgentCore Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Agent Name:** mark-vle-agent" >> $GITHUB_STEP_SUMMARY
          echo "**Image URI:** ${{ needs.build-and-push.outputs.IMAGE_URI }}" >> $GITHUB_STEP_SUMMARY
          echo "**Runtime ARN:** arn:aws:bedrock-agentcore:us-east-1:138720056246:runtime/agent-675ATtDQE1" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test the agent:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "aws bedrock-agentcore invoke-agent \\" >> $GITHUB_STEP_SUMMARY
          echo "  --agent-arn <agent-arn> \\" >> $GITHUB_STEP_SUMMARY
          echo '  --input "What is TNH-SPEED-1?" \' >> $GITHUB_STEP_SUMMARY
          echo "  --region ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
