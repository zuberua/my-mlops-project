name: Deploy Mark Vle Agent to ECR

on:
  push:
    branches:
      - main
    paths:
      - 'mark-vle-strands-agent/**'
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: bedrock-agentcore-mcp_server
  IMAGE_TAG: latest
  S3_BUCKET_PREFIX: markvie-vectors

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    
    outputs:
      IMAGE_URI: ${{ steps.output.outputs.IMAGE_URI }}
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-MarkVleAgent
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        working-directory: ./mark-vle-strands-agent
        run: |
          pip install boto3 numpy
      
      - name: Setup S3 Vector Bucket and Knowledge Base
        working-directory: ./mark-vle-strands-agent
        env:
          AWS_PROFILE: ""  # Use GitHub Actions credentials
        run: |
          echo "Setting up S3 Vector Bucket and Knowledge Base..."
          
          # Make script executable
          chmod +x scripts/setup_vector_bucket_and_kb.sh
          
          # Run setup with non-interactive mode
          export AWS_REGION=${{ env.AWS_REGION }}
          export BUCKET_NAME=${{ env.S3_BUCKET_PREFIX }}
          export ENVIRONMENT=production
          export STACK_NAME=mark-vle-vector-bucket
          
          # Check if stack exists
          if aws cloudformation describe-stacks --stack-name $STACK_NAME --region $AWS_REGION 2>/dev/null; then
            echo "✓ CloudFormation stack already exists"
          else
            echo "Creating CloudFormation stack..."
            aws cloudformation create-stack \
              --stack-name $STACK_NAME \
              --template-body file://cloudformation/vector-bucket.yaml \
              --parameters \
                ParameterKey=VectorBucketName,ParameterValue=$BUCKET_NAME \
                ParameterKey=Environment,ParameterValue=$ENVIRONMENT \
              --region $AWS_REGION
            
            echo "Waiting for stack creation..."
            aws cloudformation wait stack-create-complete \
              --stack-name $STACK_NAME \
              --region $AWS_REGION
            
            echo "✓ Stack created successfully"
          fi
          
          # Get bucket name from stack
          FULL_BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --region $AWS_REGION \
            --query 'Stacks[0].Outputs[?OutputKey==`VectorBucketName`].OutputValue' \
            --output text)
          
          echo "Bucket Name: $FULL_BUCKET_NAME"
          
          # Check if embeddings already exist
          EMBEDDING_COUNT=$(aws s3 ls s3://$FULL_BUCKET_NAME/embeddings/blocks/ 2>/dev/null | wc -l || echo "0")
          
          if [ "$EMBEDDING_COUNT" -gt 200 ]; then
            echo "✓ Embeddings already exist ($EMBEDDING_COUNT files)"
          else
            echo "Generating and uploading embeddings..."
            export S3_BUCKET_NAME=$FULL_BUCKET_NAME
            python3 scripts/process_block_library.py
            echo "✓ Embeddings uploaded successfully"
          fi
          
          echo "✓ S3 Vector Bucket and Knowledge Base setup complete"
      
      - name: Verify Setup
        working-directory: ./mark-vle-strands-agent
        run: |
          echo "Verifying setup..."
          
          # Get stack name and bucket
          STACK_NAME=mark-vle-vector-bucket
          FULL_BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].Outputs[?OutputKey==`VectorBucketName`].OutputValue' \
            --output text)
          
          echo "1. Checking CloudFormation stack..."
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].StackStatus' \
            --output text)
          
          if [ "$STACK_STATUS" == "CREATE_COMPLETE" ] || [ "$STACK_STATUS" == "UPDATE_COMPLETE" ]; then
            echo "   ✓ Stack status: $STACK_STATUS"
          else
            echo "   ✗ Stack status: $STACK_STATUS"
            exit 1
          fi
          
          echo "2. Checking S3 bucket access..."
          if aws s3 ls s3://$FULL_BUCKET_NAME/ > /dev/null 2>&1; then
            echo "   ✓ Can access bucket: $FULL_BUCKET_NAME"
          else
            echo "   ✗ Cannot access bucket: $FULL_BUCKET_NAME"
            exit 1
          fi
          
          echo "3. Checking embeddings..."
          EMBEDDING_COUNT=$(aws s3 ls s3://$FULL_BUCKET_NAME/embeddings/blocks/ | wc -l | tr -d ' ')
          
          if [ "$EMBEDDING_COUNT" -ge 200 ]; then
            echo "   ✓ Found $EMBEDDING_COUNT embeddings"
          else
            echo "   ✗ Only found $EMBEDDING_COUNT embeddings (expected 206)"
            exit 1
          fi
          
          echo "4. Checking knowledge base JSON..."
          if [ -f "knowledge-base/markvie_block_library.json" ]; then
            BLOCK_COUNT=$(python3 -c "import json; print(len(json.load(open('knowledge-base/markvie_block_library.json'))))")
            echo "   ✓ Knowledge base has $BLOCK_COUNT blocks"
          else
            echo "   ✗ Knowledge base JSON not found"
            exit 1
          fi
          
          echo "5. Checking Bedrock access..."
          if aws bedrock list-foundation-models --region ${{ env.AWS_REGION }} --query 'modelSummaries[?contains(modelId, `claude`)].modelId' --output text > /dev/null 2>&1; then
            echo "   ✓ Can access Bedrock models"
          else
            echo "   ⚠ Cannot access Bedrock (may need to enable in console)"
          fi
          
          echo ""
          echo "✅ Verification complete!"
          echo "   - Stack: $STACK_NAME"
          echo "   - Bucket: $FULL_BUCKET_NAME"
          echo "   - Embeddings: $EMBEDDING_COUNT files"
          echo "   - Blocks: $BLOCK_COUNT definitions"
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build, tag, and push image to Amazon ECR
        working-directory: ./mark-vle-strands-agent
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building Docker image for ARM64 (required by AgentCore)..."
          docker buildx build \
            --platform linux/arm64 \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push \
            .
          
          echo "✓ Image pushed successfully!"
          echo "Image URI: $ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "Architecture: ARM64"
          echo ""
          echo "Note: Ensure IAM execution role has access to S3 vector bucket:"
          echo "  - Bucket: ${S3_BUCKET_PREFIX}-<account-id>"
          echo "  - Region: ${{ env.AWS_REGION }}"
      
      - name: Output image URI
        id: output
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "::notice title=Deployment Complete::Image URI: $ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:latest" >> $GITHUB_OUTPUT
  
  deploy-to-agentcore:
    name: Deploy to AgentCore Runtime
    needs: build-and-push
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install boto3
        run: |
          pip install boto3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-AgentCoreDeploy
      
      - name: Deploy to AgentCore Runtime
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.IMAGE_URI }}
          RUNTIME_ID: agent-675ATtDQE1
          AGENT_NAME: mark_vle_agent
          EXECUTION_ROLE_ARN: ${{ secrets.AGENTCORE_EXECUTION_ROLE_ARN }}
        run: |
          echo "Deploying to AgentCore Runtime"
          echo "Runtime ID: $RUNTIME_ID"
          echo "Image URI: $IMAGE_URI"
          echo "Agent Name: $AGENT_NAME"
          
          python mark-vle-strands-agent/scripts/deploy_to_agentcore.py \
            --agent-name $AGENT_NAME \
            --region ${{ env.AWS_REGION }} \
            --container-uri $IMAGE_URI \
            --runtime-id $RUNTIME_ID \
            --role-arn $EXECUTION_ROLE_ARN
      
      - name: Deployment Summary
        if: success()
        run: |
          echo "## ✅ AgentCore Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f deployment_info.txt ]; then
            cat deployment_info.txt >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Agent Details:" >> $GITHUB_STEP_SUMMARY
          echo "- **Name:** mark_vle_agent" >> $GITHUB_STEP_SUMMARY
          echo "- **Runtime:** agent-675ATtDQE1" >> $GITHUB_STEP_SUMMARY
          echo "- **Region:** ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Architecture:** Local RAG with S3 Vector Storage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Prerequisites Verified:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ S3 Vector Bucket: \`${S3_BUCKET_PREFIX}-<account-id>\`" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 206 Block Embeddings Loaded" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ IAM Role Access to S3 Bucket" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test the Agent:" >> $GITHUB_STEP_SUMMARY
          echo '```python' >> $GITHUB_STEP_SUMMARY
          echo "import boto3" >> $GITHUB_STEP_SUMMARY
          echo "client = boto3.client('bedrock-agentcore-runtime', region_name='${{ env.AWS_REGION }}')" >> $GITHUB_STEP_SUMMARY
          echo "response = client.invoke_agent(" >> $GITHUB_STEP_SUMMARY
          echo "    agentName='mark_vle_agent'," >> $GITHUB_STEP_SUMMARY
          echo "    inputText='What are the inputs of the TIMER block?'" >> $GITHUB_STEP_SUMMARY
          echo ")" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
