AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Mark Vle Block Pin Ingestion Pipeline
  S3 (CSV upload) → Lambda → DynamoDB

Parameters:
  TableName:
    Type: String
    Default: MarkvleBlockPins
  BucketName:
    Type: String
    Default: markvle-block-pins
    Description: S3 bucket name prefix (account ID will be appended)
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging, development]

Resources:

  # ─── S3 Bucket ───
  UploadBucket:
    Type: AWS::S3::Bucket
    DependsOn: LambdaInvokePermission
    Properties:
      BucketName: !Sub '${BucketName}-${AWS::AccountId}'
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: 's3:ObjectCreated:*'
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: uploads/
                  - Name: suffix
                    Value: .csv
            Function: !GetAtt CsvProcessorFunction.Arn
      LifecycleConfiguration:
        Rules:
          - Id: CleanupProcessedFiles
            Prefix: processed/
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Project
          Value: MarkvleBlockPins

  # ─── DynamoDB Table ───
  BlockPinsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TableName}-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: BlockTypeIndex
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: LocatorIndex
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: MarkvleBlockPins
        - Key: Environment
          Value: !Ref Environment

  # ─── Lambda Function ───
  CsvProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'markvle-csv-processor-${Environment}'
      Runtime: python3.12
      Handler: handler.handler
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          TABLE_NAME: !Ref BlockPinsTable
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          # Placeholder — deploy actual code via deploy.sh
          def handler(event, context):
              return {'statusCode': 200}
      Tags:
        - Key: Project
          Value: MarkvleBlockPins

  # ─── Lambda Permission (allow S3 to invoke) ───
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt CsvProcessorFunction.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub 'arn:aws:s3:::${BucketName}-${AWS::AccountId}'
      SourceAccount: !Ref AWS::AccountId

  # ─── IAM Role for Lambda ───
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'markvle-csv-processor-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${BucketName}-${AWS::AccountId}/*'
        - PolicyName: DynamoDBWriteAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:BatchWriteItem
                  - dynamodb:PutItem
                Resource:
                  - !GetAtt BlockPinsTable.Arn
                  - !Sub '${BlockPinsTable.Arn}/index/*'

Outputs:
  TableName:
    Value: !Ref BlockPinsTable
    Description: DynamoDB table name
  TableArn:
    Value: !GetAtt BlockPinsTable.Arn
  BucketName:
    Value: !Ref UploadBucket
    Description: S3 bucket for CSV uploads
  LambdaFunctionName:
    Value: !Ref CsvProcessorFunction
    Description: Lambda function name
  UploadPath:
    Value: !Sub 's3://${UploadBucket}/uploads/'
    Description: Upload CSV files here to trigger processing
